# fly.toml app configuration file generated for bmsydney-order-v9 on 2026-03-08T17:43:46+11:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bmsydney-order-v9'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[[mounts]]
  source = 'bmsydney_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
